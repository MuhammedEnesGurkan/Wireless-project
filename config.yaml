infrastructure:
  vm1:
    host: "192.168.80.141"
    port: 22
    user: "wazuh"
    ssh_key_path: ""
    vpn_server_ip: "10.8.0.1"
    iperf3_port: 5201

  vm2:
    host: "192.168.80.145"
    port: 22
    user: "sshka"
    ssh_key_path: ""
    network_interface: "eth0"
    iperf3_port: 5201

ssh:
  connection_pool_max: 2
  connect_timeout: 15
  command_timeout: 120
  keepalive_interval: 30

vpn:
  wireguard:
    server_interface: "wg0"
    client_interface: "wg0"
    server_vpn_ip: "10.200.0.1"
    client_vpn_ip: "10.200.0.2"
    listen_port: 51820
    service_name: "wg-quick@wg0"

  openvpn_udp:
    server_config: "/etc/openvpn/server/server-udp.conf"
    client_config: "/etc/openvpn/client/client-udp.conf"
    server_vpn_ip: "10.8.0.1"
    client_vpn_ip: "10.8.0.6"
    port: 1194
    protocol: "udp"
    service_name: "openvpn-server@server-udp"

  openvpn_tcp:
    server_config: "/etc/openvpn/server/server-tcp.conf"
    client_config: "/etc/openvpn/client/client-tcp.conf"
    server_vpn_ip: "10.9.0.1"
    client_vpn_ip: "10.9.0.6"
    port: 1194
    protocol: "tcp"
    service_name: "openvpn-server@server-tcp"

  ipsec:
    server_vpn_ip: "10.10.0.1"
    client_vpn_ip: "10.10.0.2"
    service_name: "strongswan"
    connection_name: "vpn-bench"
    ike_proposal: "aes128-sha256-modp2048"
    esp_proposal: "aes128gcm16-modp2048"

network_conditions:
  real_time:
    label: "Real Time"
    emoji: "🟢"
    delay_ms: 0
    jitter_ms: 0
    loss_percent: 0.0
    rate_mbit: 0
    hping3_flood: false

  home_network:
    label: "Home Network"
    emoji: "🏠"
    delay_ms: 10
    jitter_ms: 0
    loss_percent: 0.1
    rate_mbit: 100
    hping3_flood: false

  airplane_wifi:
    label: "Airplane WiFi"
    emoji: "✈️"
    delay_ms: 600
    jitter_ms: 200
    loss_percent: 5.0
    rate_mbit: 2
    hping3_flood: false

  industrial_iot:
    label: "Industrial IoT"
    emoji: "🏗️"
    delay_ms: 80
    jitter_ms: 20
    loss_percent: 2.0
    rate_mbit: 10
    hping3_flood: false

  mobile_4g:
    label: "4G Mobile"
    emoji: "📱"
    delay_ms: 80
    jitter_ms: 30
    loss_percent: 1.0
    rate_mbit: 20
    hping3_flood: false

  stress_dos:
    label: "Stress / DoS"
    emoji: "🔥"
    delay_ms: 200
    jitter_ms: 0
    loss_percent: 10.0
    rate_mbit: 5
    hping3_flood: true
    hping3_target: "192.168.56.10"
    hping3_duration_sec: 30

tests:
  latency:
    ping_interval_sec: 0.5
    ping_count: 120
    verify_ping_count: 3
    verify_max_attempts: 3
    verify_wait_sec: 5

  throughput:
    iperf3_duration_sec: 30
    iperf3_parallel: 1
    iperf3_json: true

  cpu:
    vmstat_interval_sec: 1
    vmstat_samples: 3

scoring:
  latency_weight: 0.4
  throughput_weight: 0.4
  cpu_weight: 0.2
  score_max: 100

backend:
  host: "0.0.0.0"
  port: 8000
  cors_origins:
    - "http://localhost:5173"
    - "http://127.0.0.1:5173"
  websocket_path: "/ws/test"
  websocket_heartbeat_sec: 15
  log_level: "INFO"
  log_format: "json"

frontend:
  port: 5173
  api_base_url: "http://localhost:8000"
  ws_url: "ws://localhost:8000/ws/test"
